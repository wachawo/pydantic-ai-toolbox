name: Publish
on:
  push:
    tags:
      - "*.*.*"
      - "v*"
  workflow_dispatch:
    inputs:
      build:
        description: "Wheel build tag (workaround for PyPI file-name reuse; publishes wheel only)"
        required: false
        default: ""
permissions:
  contents: read
  id-token: write
jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -U build
      - run: python -m build
      - name: Retag wheel with build number
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.build != ''
        run: |
          python -m pip install -U wheel
          wheel tags --build "${{ github.event.inputs.build }}" --remove dist/*.whl
          rm -f dist/*.tar.gz
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
